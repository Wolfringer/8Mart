#petals-front {

}

@keyframes fadeTitle {

/* Букет */

    position: relative;

}

.flower-container img {
    width: 100%;

    transform: scale(0.85);

}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: scale(0.85);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* Лепестки */
.petal {
    position: absolute;
    border-radius: 60% 40% 60% 40%;
}

const imgElement = document.getElementById("randomFlower");
const randomImage = images[Math.floor(Math.random() * images.length)];

const img = new Image();
img.src = randomImage;

img.onload = function() {
imgElement.src = randomImage;
imgElement.style.display = "block";
imgElement.style.animation = "fadeIn 1.2s ease-out forwards";
};

const colors = [
    "#ff6fa5",
    "#ffb6c1",
    "#ffd1dc",
    "#ffcc66",
    "#ffffff",
    "#f48fb1",
    "#ffe066"
];

function createPetal() {

    const petal = document.createElement("div");
    petal.classList.add("petal");

    const size = 8 + Math.random() * 18;
    petal.style.width = size + "px";
    petal.style.height = size * 1.4 + "px";
    petal.style.background = colors[Math.floor(Math.random() * colors.length)];
    petal.style.opacity = 0.4 + Math.random() * 0.6;

    // случайный слой
    const isFront = Math.random() > 0.5;
    const container = isFront
        ? document.getElementById("petals-front")
        : document.getElementById("petals-back");

    let x = Math.random() * window.innerWidth;
    let y = -50;

    const speedY = 1 + Math.random() * 2;
    const swingAmplitude = 20 + Math.random() * 40;
    const swingSpeed = 0.01 + Math.random() * 0.02;
    const rotationSpeed = Math.random() * 4;

    let angle = 0;
    let time = 0;

    petal.style.left = x + "px";
    container.appendChild(petal);

    function animate() {
        y += speedY;
        time += swingSpeed;

        const offsetX = Math.sin(time) * swingAmplitude;
        angle += rotationSpeed;

        petal.style.transform =
            `translate(${offsetX}px, ${y}px) rotate(${angle}deg)`;

        if (y < window.innerHeight + 60) {
            requestAnimationFrame(animate);
        } else {
            petal.remove();
        }
    }

    animate();
}

setInterval(createPetal, 200);
